<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="980" viewBox="0 0 1800 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
    <marker id="dashArrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #0f172a; }
      .label { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #0f172a; }
      .small { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #334155; }
      .tiny { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 15px; fill: #475569; }
      .pathbox { fill: #f8fafc; stroke: #2563eb; stroke-width: 3; stroke-dasharray: 9 7; rx: 24; }
      .block { fill: #dbeafe; stroke: #1d4ed8; stroke-width: 2; rx: 8; }
      .block2 { fill: #e0f2fe; stroke: #0284c7; stroke-width: 2; rx: 8; }
      .desa { fill: #dcfce7; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .detda { fill: #fae8ff; stroke: #a21caf; stroke-width: 2.4; rx: 10; }
      .global { fill: #fef3c7; stroke: #d97706; stroke-width: 2.2; rx: 10; }
      .fusion { fill: #fee2e2; stroke: #dc2626; stroke-width: 2.2; rx: 10; }
      .input { fill: #f1f5f9; stroke: #475569; stroke-width: 2; rx: 12; }
      .mask { fill: #ecfccb; stroke: #65a30d; stroke-width: 2.2; rx: 10; }
      .pred { fill: #e0e7ff; stroke: #4f46e5; stroke-width: 2.2; rx: 10; }
      .arrow { stroke: #334155; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #64748b; stroke-width: 2.4; fill: none; stroke-dasharray: 7 6; marker-end: url(#dashArrow); }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="980" fill="#ffffff"/>
  <text x="900" y="58" text-anchor="middle" class="title">Aphid-DESA-DE-TDA-SlowFast 蚜虫产子行为识别网络</text>

  <!-- Input -->
  <rect x="46" y="400" width="170" height="150" class="input"/>
  <text x="131" y="438" text-anchor="middle" class="label">输入视频</text>
  <text x="131" y="470" text-anchor="middle" class="small">32帧均匀采样</text>
  <text x="131" y="500" text-anchor="middle" class="small">RGB clips</text>
  <text x="131" y="530" text-anchor="middle" class="tiny">aphid instance</text>

  <!-- Path containers -->
  <rect x="265" y="105" width="990" height="305" class="pathbox"/>
  <rect x="265" y="500" width="990" height="305" class="pathbox"/>
  <text x="292" y="145" class="label">Slow pathway</text>
  <text x="292" y="540" class="label">Fast pathway</text>

  <!-- Slow blocks -->
  <rect x="305" y="180" width="110" height="80" class="block"/>
  <text x="360" y="210" text-anchor="middle" class="small">Conv1</text>
  <text x="360" y="236" text-anchor="middle" class="tiny">T/α</text>

  <rect x="440" y="180" width="110" height="80" class="block"/>
  <text x="495" y="210" text-anchor="middle" class="small">Pool1</text>
  <text x="495" y="236" text-anchor="middle" class="tiny">Downsample</text>

  <rect x="575" y="160" width="120" height="110" class="block2"/>
  <text x="635" y="190" text-anchor="middle" class="small">Res2</text>
  <text x="635" y="214" text-anchor="middle" class="tiny">3 blocks</text>
  <rect x="590" y="233" width="90" height="26" class="desa"/>
  <text x="635" y="252" text-anchor="middle" class="tiny">DESA</text>

  <rect x="725" y="160" width="120" height="110" class="block2"/>
  <text x="785" y="190" text-anchor="middle" class="small">Res3</text>
  <text x="785" y="214" text-anchor="middle" class="tiny">4 blocks</text>
  <rect x="740" y="233" width="90" height="26" class="desa"/>
  <text x="785" y="252" text-anchor="middle" class="tiny">DESA</text>

  <rect x="875" y="160" width="120" height="110" class="block2"/>
  <text x="935" y="190" text-anchor="middle" class="small">Res4</text>
  <text x="935" y="214" text-anchor="middle" class="tiny">6 blocks</text>
  <rect x="890" y="233" width="90" height="26" class="desa"/>
  <text x="935" y="252" text-anchor="middle" class="tiny">DESA</text>

  <rect x="1025" y="160" width="120" height="110" class="block2"/>
  <text x="1085" y="190" text-anchor="middle" class="small">Res5</text>
  <text x="1085" y="214" text-anchor="middle" class="tiny">3 blocks</text>
  <rect x="1040" y="233" width="90" height="26" class="desa"/>
  <text x="1085" y="252" text-anchor="middle" class="tiny">DESA</text>

  <rect x="1170" y="180" width="65" height="80" class="block"/>
  <text x="1202" y="212" text-anchor="middle" class="small">F</text>
  <text x="1202" y="238" text-anchor="middle" class="tiny">map</text>

  <!-- Fast blocks -->
  <rect x="305" y="575" width="110" height="80" class="block"/>
  <text x="360" y="605" text-anchor="middle" class="small">Conv1</text>
  <text x="360" y="631" text-anchor="middle" class="tiny">T</text>

  <rect x="440" y="575" width="110" height="80" class="block"/>
  <text x="495" y="605" text-anchor="middle" class="small">Pool1</text>
  <text x="495" y="631" text-anchor="middle" class="tiny">Downsample</text>

  <rect x="575" y="555" width="120" height="110" class="block2"/>
  <text x="635" y="585" text-anchor="middle" class="small">Res2</text>
  <text x="635" y="609" text-anchor="middle" class="tiny">3 blocks</text>
  <rect x="590" y="628" width="90" height="26" class="desa"/>
  <text x="635" y="647" text-anchor="middle" class="tiny">DESA</text>

  <rect x="725" y="555" width="120" height="110" class="block2"/>
  <text x="785" y="585" text-anchor="middle" class="small">Res3</text>
  <text x="785" y="609" text-anchor="middle" class="tiny">4 blocks</text>
  <rect x="740" y="628" width="90" height="26" class="desa"/>
  <text x="785" y="647" text-anchor="middle" class="tiny">DESA</text>

  <rect x="875" y="555" width="120" height="110" class="block2"/>
  <text x="935" y="585" text-anchor="middle" class="small">Res4</text>
  <text x="935" y="609" text-anchor="middle" class="tiny">6 blocks</text>
  <rect x="890" y="628" width="90" height="26" class="desa"/>
  <text x="935" y="647" text-anchor="middle" class="tiny">DESA</text>

  <rect x="1025" y="555" width="120" height="110" class="block2"/>
  <text x="1085" y="585" text-anchor="middle" class="small">Res5</text>
  <text x="1085" y="609" text-anchor="middle" class="tiny">3 blocks</text>
  <rect x="1040" y="628" width="90" height="26" class="desa"/>
  <text x="1085" y="647" text-anchor="middle" class="tiny">DESA</text>

  <rect x="1170" y="575" width="65" height="80" class="block"/>
  <text x="1202" y="607" text-anchor="middle" class="small">F</text>
  <text x="1202" y="633" text-anchor="middle" class="tiny">map</text>

  <!-- Mask generator -->
  <rect x="480" y="842" width="310" height="95" class="mask"/>
  <text x="635" y="875" text-anchor="middle" class="label">Dual-End Mask Generator</text>
  <text x="635" y="906" text-anchor="middle" class="small">根据个体长轴两端生成空间先验 M</text>

  <!-- Right modules -->
  <rect x="1320" y="195" width="175" height="115" class="global"/>
  <text x="1407" y="232" text-anchor="middle" class="label">Global Path</text>
  <text x="1407" y="263" text-anchor="middle" class="small">GAP + Time Avg</text>
  <text x="1407" y="291" text-anchor="middle" class="tiny">X_global</text>

  <rect x="1320" y="525" width="220" height="175" class="detda"/>
  <text x="1430" y="560" text-anchor="middle" class="label">DE-TDA</text>
  <text x="1430" y="592" text-anchor="middle" class="small">Dual-End Pooling</text>
  <text x="1430" y="622" text-anchor="middle" class="small">D<tspan baseline-shift="sub">t</tspan>=|X<tspan baseline-shift="sub">t</tspan>-X<tspan baseline-shift="sub">t-1</tspan>|</text>
  <text x="1430" y="652" text-anchor="middle" class="small">Temporal Attention</text>
  <text x="1430" y="680" text-anchor="middle" class="tiny">X_DE-TDA</text>

  <rect x="1585" y="360" width="155" height="110" class="fusion"/>
  <text x="1662" y="397" text-anchor="middle" class="label">Fusion</text>
  <text x="1662" y="428" text-anchor="middle" class="small">X = Xg + βXd</text>
  <text x="1662" y="454" text-anchor="middle" class="tiny">feature fusion</text>

  <rect x="1585" y="560" width="155" height="115" class="pred"/>
  <text x="1662" y="595" text-anchor="middle" class="label">Prediction</text>
  <text x="1662" y="626" text-anchor="middle" class="small">Dropout + FC</text>
  <text x="1662" y="654" text-anchor="middle" class="small">Softmax</text>

  <rect x="1585" y="735" width="155" height="95" class="input"/>
  <text x="1662" y="771" text-anchor="middle" class="label">3 Classes</text>
  <text x="1662" y="801" text-anchor="middle" class="small">nobirth / start / birth</text>

  <!-- Main arrows -->
  <path d="M216 445 C245 345 260 250 300 220" class="arrow"/>
  <path d="M216 505 C245 595 260 615 300 615" class="arrow"/>

  <!-- slow block arrows -->
  <path d="M415 220 L438 220" class="arrow"/>
  <path d="M550 220 L573 220" class="arrow"/>
  <path d="M695 215 L723 215" class="arrow"/>
  <path d="M845 215 L873 215" class="arrow"/>
  <path d="M995 215 L1023 215" class="arrow"/>
  <path d="M1145 220 L1168 220" class="arrow"/>

  <!-- fast block arrows -->
  <path d="M415 615 L438 615" class="arrow"/>
  <path d="M550 615 L573 615" class="arrow"/>
  <path d="M695 610 L723 610" class="arrow"/>
  <path d="M845 610 L873 610" class="arrow"/>
  <path d="M995 610 L1023 610" class="arrow"/>
  <path d="M1145 615 L1168 615" class="arrow"/>

  <!-- feature map to global / detda -->
  <path d="M1235 220 C1275 220 1288 250 1320 250" class="arrow"/>
  <path d="M1235 615 C1278 615 1288 612 1320 612" class="arrow"/>
  <path d="M1235 220 C1290 290 1278 538 1320 575" class="arrow"/>
  <path d="M1235 615 C1275 648 1282 648 1320 648" class="arrow"/>

  <!-- module arrows -->
  <path d="M1495 253 C1540 280 1552 350 1585 392" class="arrow"/>
  <path d="M1540 612 C1570 585 1572 505 1585 440" class="arrow"/>
  <path d="M1662 470 L1662 558" class="arrow"/>
  <path d="M1662 675 L1662 733" class="arrow"/>

  <!-- Mask dashed arrows to DESA and DE-TDA -->
  <path d="M635 842 C610 760 610 710 635 665" class="dash"/>
  <path d="M635 842 C610 455 610 315 635 270" class="dash"/>
  <path d="M790 885 C1130 875 1260 705 1325 646" class="dash"/>
  <path d="M790 885 C1260 885 1320 680 1360 628" class="dash"/>

  <!-- Legend -->
  <rect x="52" y="860" width="340" height="82" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" rx="10"/>
  <rect x="75" y="882" width="28" height="20" class="desa"/>
  <text x="118" y="899" class="tiny">DESA: 双端空间特征增强</text>
  <rect x="75" y="914" width="28" height="20" class="detda"/>
  <text x="118" y="931" class="tiny">DE-TDA: 双端时序差分注意力</text>
</svg>
