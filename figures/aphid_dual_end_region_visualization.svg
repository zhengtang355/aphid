<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620">
  <defs>
    <linearGradient id="leaf" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#c5df79"/>
      <stop offset="0.55" stop-color="#98bf4f"/>
      <stop offset="1" stop-color="#6f9a38"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8.5" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M1,1 L9,5 L1,9 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #0f172a; }
      .label { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 22px; font-weight: 700; fill: #111827; }
      .small { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 17px; fill: #334155; }
      .note { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 16px; fill: #475569; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .line { stroke: #334155; stroke-width: 2.3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #ef4444; stroke-width: 3; stroke-dasharray: 8 7; fill: none; }
    </style>
  </defs>

  <rect width="1100" height="620" fill="#ffffff"/>
  <text x="550" y="48" text-anchor="middle" class="title">蚜虫个体双端区域划分可视化</text>

  <!-- main image panel -->
  <rect x="120" y="95" width="860" height="390" class="box"/>
  <rect x="185" y="150" width="730" height="275" rx="8" fill="url(#leaf)" stroke="#64748b" stroke-width="2"/>

  <!-- leaf texture -->
  <path d="M185,395 C330,310 560,260 915,185" stroke="#668e34" stroke-width="8" fill="none" opacity="0.25"/>
  <path d="M215,425 C390,330 610,250 895,152" stroke="#d7ebb3" stroke-width="4" fill="none" opacity="0.45"/>
  <path d="M230,170 C330,235 445,275 600,305" stroke="#799f3e" stroke-width="3" fill="none" opacity="0.24"/>
  <path d="M510,150 C610,230 720,300 890,384" stroke="#799f3e" stroke-width="3" fill="none" opacity="0.22"/>

  <!-- detection box/crop boundary -->
  <rect x="320" y="205" width="460" height="160" fill="none" stroke="#1e293b" stroke-width="4"/>

  <!-- shaded dual end regions -->
  <rect x="320" y="205" width="153.3" height="160" fill="#ef4444" opacity="0.30"/>
  <rect x="626.7" y="205" width="153.3" height="160" fill="#ef4444" opacity="0.30"/>
  <line x1="473.3" y1="205" x2="473.3" y2="365" class="dash"/>
  <line x1="626.7" y1="205" x2="626.7" y2="365" class="dash"/>

  <!-- stylized aphid based on provided small crop -->
  <ellipse cx="512" cy="286" rx="116" ry="74" fill="#0b0f13"/>
  <ellipse cx="615" cy="276" rx="48" ry="41" fill="#171b21"/>
  <ellipse cx="460" cy="269" rx="58" ry="44" fill="#111827"/>
  <circle cx="570" cy="244" r="8" fill="#e5e7eb" opacity="0.55"/>
  <circle cx="608" cy="246" r="5" fill="#f8fafc" opacity="0.5"/>
  <path d="M420,260 L356,226 M420,305 L354,340 M475,222 L432,162 M520,212 L512,145 M575,344 L605,416 M630,322 L716,382" stroke="#0b0f13" stroke-width="7" stroke-linecap="round"/>
  <path d="M668,270 L735,245 M658,300 L730,322" stroke="#0b0f13" stroke-width="6" stroke-linecap="round"/>
  <path d="M416,246 C454,216 521,204 588,224" stroke="#f8fafc" stroke-width="4" fill="none" opacity="0.28"/>
  <path d="M441,325 C502,355 570,344 632,305" stroke="#f8fafc" stroke-width="3" fill="none" opacity="0.16"/>

  <!-- long axis -->
  <line x1="320" y1="398" x2="780" y2="398" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="550" y="430" text-anchor="middle" class="small">个体长轴方向</text>

  <!-- labels -->
  <text x="396" y="188" text-anchor="middle" class="label" fill="#991b1b">双端区域</text>
  <text x="550" y="188" text-anchor="middle" class="label">中间区域</text>
  <text x="704" y="188" text-anchor="middle" class="label" fill="#991b1b">双端区域</text>

  <path d="M396,195 V222" class="line"/>
  <path d="M550,195 V222" class="line"/>
  <path d="M704,195 V222" class="line"/>

  <!-- formula note -->
  <rect x="175" y="515" width="750" height="65" rx="10" fill="#f8fafc" stroke="#334155" stroke-width="1.8"/>
  <text x="205" y="545" class="note">划分规则：沿检测框长轴方向三等分，取两端各 1/3 区域作为双端空间先验，中间 1/3 区域不增强。</text>
  <text x="205" y="570" class="note">二值掩码：双端区域 M=1，中间区域 M=0，随后 resize 到对应 Res stage 特征图尺寸。</text>
</svg>
