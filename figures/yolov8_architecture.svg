<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1250" viewBox="0 0 2400 1250">
  <defs>
    <style>
      .title { font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111827; }
      .sub { font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; font-size: 20px; fill: #374151; }
      .txt { font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; font-size: 18px; fill: #1f2937; }
      .sm { font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; font-size: 15px; fill: #4b5563; }
      .tiny { font-family: "Microsoft YaHei", "Noto Sans SC", Arial, sans-serif; font-size: 13px; fill: #6b7280; }
      .box { fill: #f8fafc; stroke: #334155; stroke-width: 2.2; rx: 14; ry: 14; }
      .blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.2; rx: 14; ry: 14; }
      .green { fill: #ecfdf5; stroke: #059669; stroke-width: 2.2; rx: 14; ry: 14; }
      .amber { fill: #fffbeb; stroke: #d97706; stroke-width: 2.2; rx: 14; ry: 14; }
      .rose { fill: #fff1f2; stroke: #e11d48; stroke-width: 2.2; rx: 14; ry: 14; }
      .line { stroke: #111827; stroke-width: 2.8; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #2563eb; stroke-width: 2.2; fill: none; stroke-dasharray: 7 6; marker-end: url(#arrowBlue); }
      .soft { stroke: #64748b; stroke-width: 2.2; fill: none; marker-end: url(#arrowSoft); }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#111827"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowSoft" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#64748b"/>
    </marker>
  </defs>

  <rect width="2400" height="1250" fill="#ffffff"/>
  <text class="title" x="1200" y="54" text-anchor="middle">YOLOv8 Architecture</text>
  <text class="sub" x="1200" y="88" text-anchor="middle">YOLOv8完整网络架构图</text>

  <!-- Input -->
  <rect class="box" x="50" y="160" width="240" height="150"/>
  <text class="txt" x="170" y="202" text-anchor="middle">Input image</text>
  <text class="sm" x="170" y="230" text-anchor="middle">输入图像</text>
  <text class="tiny" x="170" y="258" text-anchor="middle">RGB image</text>
  <text class="tiny" x="170" y="282" text-anchor="middle">RGB输入</text>

  <rect class="blue" x="330" y="145" width="280" height="180"/>
  <text class="txt" x="470" y="186" text-anchor="middle">Data augmentation</text>
  <text class="sm" x="470" y="214" text-anchor="middle">数据增强</text>
  <text class="tiny" x="470" y="242" text-anchor="middle">mosaic / mixup / random scale</text>
  <text class="tiny" x="470" y="266" text-anchor="middle">mosaic、mixup、随机缩放</text>
  <text class="tiny" x="470" y="290" text-anchor="middle">HSV / flip / crop</text>
  <path class="line" d="M290 235 L330 235"/>

  <!-- Backbone -->
  <rect class="green" x="690" y="110" width="650" height="360"/>
  <text class="txt" x="1015" y="152" text-anchor="middle">Backbone</text>
  <text class="sm" x="1015" y="178" text-anchor="middle">主干网络</text>
  <text class="tiny" x="1015" y="204" text-anchor="middle">feature extraction / 特征提取</text>

  <rect class="box" x="730" y="230" width="105" height="88"/>
  <text class="sm" x="782" y="260" text-anchor="middle">Conv</text>
  <text class="tiny" x="782" y="286" text-anchor="middle">卷积</text>

  <rect class="box" x="860" y="230" width="135" height="88"/>
  <text class="sm" x="927" y="260" text-anchor="middle">C2f</text>
  <text class="tiny" x="927" y="286" text-anchor="middle">C2f模块</text>

  <rect class="box" x="1020" y="230" width="135" height="88"/>
  <text class="sm" x="1087" y="260" text-anchor="middle">C2f</text>
  <text class="tiny" x="1087" y="286" text-anchor="middle">C2f模块</text>

  <rect class="box" x="1180" y="230" width="135" height="88"/>
  <text class="sm" x="1247" y="260" text-anchor="middle">SPPF</text>
  <text class="tiny" x="1247" y="286" text-anchor="middle">空间金字塔池化</text>

  <path class="line" d="M835 274 L860 274"/>
  <path class="line" d="M995 274 L1020 274"/>
  <path class="line" d="M1155 274 L1180 274"/>
  <path class="line" d="M610 235 L690 235"/>

  <text class="tiny" x="1015" y="350" text-anchor="middle">C2f blocks refine local and semantic features</text>
  <text class="tiny" x="1015" y="374" text-anchor="middle">C2f模块用于增强局部与语义特征</text>
  <text class="tiny" x="1015" y="402" text-anchor="middle">SPPF enlarges receptive field / SPPF扩大感受野</text>

  <!-- Pyramid outputs -->
  <rect class="blue" x="740" y="520" width="120" height="78"/>
  <text class="sm" x="800" y="550" text-anchor="middle">P3</text>
  <text class="tiny" x="800" y="573" text-anchor="middle">高分辨率</text>

  <rect class="blue" x="920" y="520" width="120" height="78"/>
  <text class="sm" x="980" y="550" text-anchor="middle">P4</text>
  <text class="tiny" x="980" y="573" text-anchor="middle">中分辨率</text>

  <rect class="blue" x="1100" y="520" width="120" height="78"/>
  <text class="sm" x="1160" y="550" text-anchor="middle">P5</text>
  <text class="tiny" x="1160" y="573" text-anchor="middle">低分辨率</text>

  <path class="dash" d="M800 470 L800 520"/>
  <path class="dash" d="M980 470 L980 520"/>
  <path class="dash" d="M1160 470 L1160 520"/>

  <!-- Neck -->
  <rect class="amber" x="1410" y="110" width="650" height="420"/>
  <text class="txt" x="1735" y="152" text-anchor="middle">Neck</text>
  <text class="sm" x="1735" y="178" text-anchor="middle">特征融合颈部</text>
  <text class="tiny" x="1735" y="204" text-anchor="middle">PAN-FPN style feature fusion / PAN-FPN式特征融合</text>

  <rect class="box" x="1460" y="230" width="120" height="78"/>
  <text class="sm" x="1520" y="260" text-anchor="middle">Upsample</text>
  <text class="tiny" x="1520" y="283" text-anchor="middle">上采样</text>

  <rect class="box" x="1610" y="230" width="120" height="78"/>
  <text class="sm" x="1670" y="260" text-anchor="middle">Concat</text>
  <text class="tiny" x="1670" y="283" text-anchor="middle">特征拼接</text>

  <rect class="box" x="1760" y="230" width="120" height="78"/>
  <text class="sm" x="1820" y="260" text-anchor="middle">C2f</text>
  <text class="tiny" x="1820" y="283" text-anchor="middle">融合块</text>

  <rect class="box" x="1910" y="230" width="120" height="78"/>
  <text class="sm" x="1970" y="260" text-anchor="middle">Downsample</text>
  <text class="tiny" x="1970" y="283" text-anchor="middle">下采样</text>

  <rect class="box" x="2060" y="230" width="120" height="78"/>
  <text class="sm" x="2120" y="260" text-anchor="middle">Concat</text>
  <text class="tiny" x="2120" y="283" text-anchor="middle">特征拼接</text>

  <rect class="box" x="2210" y="230" width="120" height="78"/>
  <text class="sm" x="2270" y="260" text-anchor="middle">C2f</text>
  <text class="tiny" x="2270" y="283" text-anchor="middle">融合块</text>

  <path class="line" d="M1360 274 L1410 274"/>
  <path class="line" d="M1580 274 L1610 274"/>
  <path class="line" d="M1730 274 L1760 274"/>
  <path class="line" d="M1880 274 L1910 274"/>
  <path class="line" d="M2030 274 L2060 274"/>
  <path class="line" d="M2180 274 L2210 274"/>

  <text class="tiny" x="1735" y="350" text-anchor="middle">top-down and bottom-up fusion / 自顶向下与自底向上融合</text>
  <text class="tiny" x="1735" y="374" text-anchor="middle">build multi-scale features for detection / 构建多尺度检测特征</text>

  <!-- Head -->
  <rect class="rose" x="720" y="680" width="965" height="300"/>
  <text class="txt" x="1202" y="724" text-anchor="middle">Decoupled detection head</text>
  <text class="sm" x="1202" y="750" text-anchor="middle">解耦检测头</text>
  <text class="tiny" x="1202" y="776" text-anchor="middle">anchor-free prediction / 无锚框预测</text>

  <rect class="box" x="780" y="820" width="180" height="88"/>
  <text class="sm" x="870" y="852" text-anchor="middle">Classification branch</text>
  <text class="tiny" x="870" y="877" text-anchor="middle">分类分支</text>

  <rect class="box" x="1010" y="820" width="180" height="88"/>
  <text class="sm" x="1100" y="852" text-anchor="middle">Regression branch</text>
  <text class="tiny" x="1100" y="877" text-anchor="middle">回归分支</text>

  <rect class="box" x="1240" y="820" width="180" height="88"/>
  <text class="sm" x="1330" y="852" text-anchor="middle">DFL + box output</text>
  <text class="tiny" x="1330" y="877" text-anchor="middle">DFL与边界框输出</text>

  <rect class="box" x="1470" y="820" width="180" height="88"/>
  <text class="sm" x="1560" y="852" text-anchor="middle">NMS</text>
  <text class="tiny" x="1560" y="877" text-anchor="middle">非极大值抑制</text>

  <path class="line" d="M960 680 L960 820"/>
  <path class="line" d="M1190 680 L1190 820"/>
  <path class="line" d="M1420 680 L1420 820"/>
  <path class="line" d="M1650 680 L1650 820"/>

  <text class="tiny" x="1202" y="952" text-anchor="middle">final outputs: class scores + bounding boxes / 最终输出：类别分数与边界框</text>

  <!-- output -->
  <rect class="box" x="1770" y="780" width="560" height="170"/>
  <text class="txt" x="2050" y="824" text-anchor="middle">Detection results</text>
  <text class="sm" x="2050" y="852" text-anchor="middle">检测结果</text>
  <text class="tiny" x="2050" y="882" text-anchor="middle">class / confidence / bbox</text>
  <text class="tiny" x="2050" y="906" text-anchor="middle">类别 / 置信度 / 边界框</text>

  <path class="line" d="M1650 864 L1770 864"/>

  <!-- legend -->
  <rect class="box" x="50" y="1040" width="2310" height="140"/>
  <text class="sm" x="120" y="1080">YOLOv8 main idea:</text>
  <text class="tiny" x="250" y="1080">Backbone extracts features, Neck fuses multi-scale features, Head predicts class and box in an anchor-free way.</text>
  <text class="tiny" x="120" y="1115">YOLOv8核心流程：</text>
  <text class="tiny" x="250" y="1115">主干提特征，颈部做多尺度融合，检测头以无锚框方式输出类别和边界框。</text>
  <text class="tiny" x="120" y="1150">For paper use / 适合论文插图</text>
</svg>
