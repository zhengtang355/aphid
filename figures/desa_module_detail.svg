<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#263238"/>
    </marker>
    <style>
      .bg{fill:#dceaff;stroke:none}
      .title{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:30px;font-weight:700;fill:#14213d}
      .label{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:18px;font-weight:700;fill:#17212b}
      .txt{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:15px;fill:#263238}
      .small{font-family:Arial,'Microsoft YaHei',sans-serif;font-size:13px;fill:#37474f}
      .tensor{fill:#b9d6c0;stroke:#5a8a6a;stroke-width:2}
      .op{fill:#c7dcff;stroke:#4f75b5;stroke-width:1.6}
      .mask{fill:#ffd9dd;stroke:#b94c5a;stroke-width:1.6}
      .interp{fill:#fff0bd;stroke:#c48a00;stroke-width:1.6}
      .mul{fill:#e8eaf6;stroke:#5c6bc0;stroke-width:1.6}
      .line{stroke:#263238;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .dash{stroke:#b71c1c;stroke-width:2.1;stroke-dasharray:8 6;fill:none;marker-end:url(#arrow)}
      .thin{stroke:#546e7a;stroke-width:1.6;fill:none;marker-end:url(#arrow)}
    </style>
  </defs>

  <rect x="20" y="20" width="1160" height="720" rx="8" class="bg"/>
  <text x="600" y="62" text-anchor="middle" class="title">DESA 双端空间注意力模块</text>

  <!-- Feature input tensor -->
  <polygon points="110,110 330,110 365,80 145,80" class="tensor"/>
  <polygon points="330,110 365,80 365,135 330,165" class="tensor"/>
  <polygon points="110,110 330,110 330,165 110,165" class="tensor"/>
  <text x="220" y="128" text-anchor="middle" class="label">Res stage feature Fᵢ</text>
  <text x="430" y="116" class="txt">Fᵢ ∈ R<tspan baseline-shift="super">Cᵢ×Tᵢ×Hᵢ×Wᵢ</tspan></text>

  <!-- Original frames -->
  <rect x="90" y="275" width="210" height="82" rx="6" class="op"/>
  <text x="195" y="306" text-anchor="middle" class="label">Input frames</text>
  <text x="195" y="332" text-anchor="middle" class="small">T×3×224×224</text>

  <!-- Mask generation -->
  <rect x="390" y="255" width="220" height="122" rx="6" class="mask"/>
  <text x="500" y="290" text-anchor="middle" class="label">Dual-End Region</text>
  <text x="500" y="316" text-anchor="middle" class="label">Estimation</text>
  <text x="500" y="344" text-anchor="middle" class="small">long-axis two ends</text>
  <text x="500" y="364" text-anchor="middle" class="small">each end = 1/3</text>

  <rect x="695" y="255" width="190" height="122" rx="6" class="mask"/>
  <text x="790" y="293" text-anchor="middle" class="label">Binary Mask M</text>
  <text x="790" y="322" text-anchor="middle" class="small">two-end region = 1</text>
  <text x="790" y="346" text-anchor="middle" class="small">middle region = 0</text>
  <text x="790" y="366" text-anchor="middle" class="small">1×T×224×224</text>

  <rect x="695" y="445" width="190" height="94" rx="6" class="interp"/>
  <text x="790" y="481" text-anchor="middle" class="label">Interp.</text>
  <text x="790" y="508" text-anchor="middle" class="small">Trilinear interpolation</text>
  <text x="790" y="528" text-anchor="middle" class="small">resize to Fᵢ size</text>

  <rect x="1000" y="445" width="165" height="94" rx="6" class="mask"/>
  <text x="1082" y="481" text-anchor="middle" class="label">Mᵢ</text>
  <text x="1082" y="508" text-anchor="middle" class="small">1×Tᵢ×Hᵢ×Wᵢ</text>
  <text x="1082" y="528" text-anchor="middle" class="small">aligned mask</text>

  <!-- Enhancement -->
  <rect x="520" y="585" width="260" height="84" rx="6" class="mul"/>
  <text x="650" y="617" text-anchor="middle" class="label">Feature Enhancement</text>
  <text x="650" y="646" text-anchor="middle" class="txt">Fᵢ' = Fᵢ × (1 + αMᵢ)</text>

  <!-- Output tensor -->
  <polygon points="880,615 1070,615 1105,585 915,585" class="tensor"/>
  <polygon points="1070,615 1105,585 1105,660 1070,690" class="tensor"/>
  <polygon points="880,615 1070,615 1070,690 880,690" class="tensor"/>
  <text x="975" y="648" text-anchor="middle" class="label">Output Fᵢ'</text>
  <text x="975" y="673" text-anchor="middle" class="small">enhanced feature</text>

  <!-- arrows -->
  <path d="M220,165 C220,250 360,520 520,620" class="line"/>
  <path d="M300,316 L390,316" class="dash"/>
  <path d="M610,316 L695,316" class="dash"/>
  <path d="M790,377 L790,445" class="dash"/>
  <path d="M885,492 L1000,492" class="dash"/>
  <path d="M1082,539 C1082,600 865,628 780,628" class="dash"/>
  <path d="M780,628 L880,648" class="line"/>

  <!-- shortcuts/notes -->
  <rect x="80" y="465" width="420" height="110" rx="6" fill="#ffffff" stroke="#78909c" stroke-width="1.5"/>
  <text x="290" y="498" text-anchor="middle" class="label">Module input</text>
  <text x="290" y="526" text-anchor="middle" class="small">1. Fᵢ: feature from Res2/Res3/Res4/Res5</text>
  <text x="290" y="550" text-anchor="middle" class="small">2. M: dual-end prior generated from original frames</text>

  <rect x="915" y="110" width="245" height="120" rx="6" fill="#ffffff" stroke="#78909c" stroke-width="1.5"/>
  <text x="1037" y="145" text-anchor="middle" class="label">Stage-wise scaling</text>
  <text x="1037" y="174" text-anchor="middle" class="small">Res2: Hᵢ,Wᵢ≈56</text>
  <text x="1037" y="196" text-anchor="middle" class="small">Res3: Hᵢ,Wᵢ≈28</text>
  <text x="1037" y="218" text-anchor="middle" class="small">Res4: Hᵢ,Wᵢ≈14; Res5: ≈7</text>

  <text x="600" y="715" text-anchor="middle" class="small">The full aphid frame is fed into SlowFast. DESA only provides a resized dual-end mask for feature re-weighting.</text>
</svg>
