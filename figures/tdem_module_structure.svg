<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="920" viewBox="0 0 1500 920">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 30px; font-weight: 700; fill: #111827; }
      .subtitle { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 18px; fill: #475569; }
      .label { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 18px; font-weight: 600; fill: #111827; }
      .small { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 15px; fill: #334155; }
      .tiny { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 13px; fill: #475569; }
      .formula { font-family: "Times New Roman", serif; font-size: 20px; fill: #111827; font-style: italic; }
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 12; }
      .input { fill: #eef2ff; stroke: #4338ca; }
      .global { fill: #ecfdf5; stroke: #047857; }
      .tdem { fill: #fff7ed; stroke: #c2410c; }
      .fusion { fill: #f8fafc; stroke: #0f172a; }
      .mask { fill: #fef2f2; stroke: #dc2626; }
      .line { stroke: #334155; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #dc2626; stroke-width: 2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .branch-label { font-family: "Microsoft YaHei", Arial, sans-serif; font-size: 17px; font-weight: 700; }
    </style>
  </defs>

  <rect x="0" y="0" width="1500" height="920" fill="#ffffff"/>
  <text x="750" y="55" text-anchor="middle" class="title">TDEM 时序差分增强模块结构图</text>
  <text x="750" y="86" text-anchor="middle" class="subtitle">从 SlowFast 主干输出特征出发，分别提取全局视频特征与时序差分增强特征，并进行残差融合</text>

  <!-- Backbone feature input -->
  <rect x="55" y="375" width="235" height="150" class="box input"/>
  <text x="172" y="415" text-anchor="middle" class="label">SlowFast 主干输出</text>
  <text x="172" y="452" text-anchor="middle" class="small">Slow 特征 Xs</text>
  <text x="172" y="477" text-anchor="middle" class="tiny">[B, Cs, Ts, Hs, Ws]</text>
  <text x="172" y="507" text-anchor="middle" class="small">Fast 特征 Xf</text>
  <text x="172" y="532" text-anchor="middle" class="tiny">[B, Cf, Tf, Hf, Wf]</text>

  <!-- Branch labels -->
  <text x="330" y="215" class="branch-label" fill="#047857">全局特征分支</text>
  <text x="330" y="615" class="branch-label" fill="#c2410c">TDEM 时序差分增强分支</text>

  <!-- Global branch -->
  <rect x="360" y="145" width="190" height="120" class="box global"/>
  <text x="455" y="183" text-anchor="middle" class="label">全局空间池化</text>
  <text x="455" y="215" text-anchor="middle" class="small">对 H,W 求平均</text>
  <text x="455" y="242" text-anchor="middle" class="tiny">保留时间维 T</text>

  <rect x="615" y="145" width="210" height="120" class="box global"/>
  <text x="720" y="183" text-anchor="middle" class="label">时间维对齐</text>
  <text x="720" y="215" text-anchor="middle" class="small">Slow 插值到 Tf</text>
  <text x="720" y="242" text-anchor="middle" class="tiny">Zs, Zf 具有相同 T</text>

  <rect x="890" y="145" width="200" height="120" class="box global"/>
  <text x="990" y="183" text-anchor="middle" class="label">通道拼接</text>
  <text x="990" y="215" text-anchor="middle" class="small">Concat(Slow, Fast)</text>
  <text x="990" y="242" text-anchor="middle" class="tiny">Zg ∈ [B, T, Cs+Cf]</text>

  <rect x="1160" y="145" width="210" height="120" class="box global"/>
  <text x="1265" y="183" text-anchor="middle" class="label">时间平均池化</text>
  <text x="1265" y="215" text-anchor="middle" class="small">Mean over T</text>
  <text x="1265" y="242" text-anchor="middle" class="formula">Fglobal</text>

  <!-- TDEM branch -->
  <rect x="345" y="550" width="215" height="130" class="box mask"/>
  <text x="452" y="588" text-anchor="middle" class="label">双端区域 Mask</text>
  <text x="452" y="620" text-anchor="middle" class="small">由个体长轴两端生成</text>
  <text x="452" y="647" text-anchor="middle" class="tiny">Resize 到各层特征尺寸</text>

  <rect x="620" y="550" width="210" height="130" class="box tdem"/>
  <text x="725" y="588" text-anchor="middle" class="label">Mask 空间池化</text>
  <text x="725" y="620" text-anchor="middle" class="small">只聚合双端区域</text>
  <text x="725" y="647" text-anchor="middle" class="tiny">得到端部时序特征</text>

  <rect x="890" y="550" width="200" height="130" class="box tdem"/>
  <text x="990" y="588" text-anchor="middle" class="label">对齐 + 拼接</text>
  <text x="990" y="620" text-anchor="middle" class="small">Slow/Fast 时间对齐</text>
  <text x="990" y="647" text-anchor="middle" class="tiny">Zd ∈ [B, T, Cs+Cf]</text>

  <rect x="1160" y="510" width="210" height="95" class="box tdem"/>
  <text x="1265" y="548" text-anchor="middle" class="label">相邻帧特征差分</text>
  <text x="1265" y="578" text-anchor="middle" class="formula">Dt = |Zd(t)-Zd(t-1)|</text>

  <rect x="1160" y="650" width="210" height="95" class="box tdem"/>
  <text x="1265" y="688" text-anchor="middle" class="label">MLP + Softmax</text>
  <text x="1265" y="718" text-anchor="middle" class="small">生成时间权重 wt</text>

  <rect x="890" y="750" width="220" height="100" class="box tdem"/>
  <text x="1000" y="790" text-anchor="middle" class="label">加权时序聚合</text>
  <text x="1000" y="822" text-anchor="middle" class="formula">Ftdem = Σ wt · Zd(t)</text>

  <!-- Fusion -->
  <rect x="610" y="360" width="270" height="110" class="box fusion"/>
  <text x="745" y="400" text-anchor="middle" class="label">残差式特征融合</text>
  <text x="745" y="432" text-anchor="middle" class="formula">Fout = Fglobal + α · Ftdem</text>

  <rect x="980" y="360" width="210" height="110" class="box fusion"/>
  <text x="1085" y="400" text-anchor="middle" class="label">归一化 + Dropout</text>
  <text x="1085" y="432" text-anchor="middle" class="small">LayerNorm / Dropout</text>

  <rect x="1260" y="360" width="180" height="110" class="box fusion"/>
  <text x="1350" y="400" text-anchor="middle" class="label">分类头</text>
  <text x="1350" y="432" text-anchor="middle" class="small">FC + Softmax</text>
  <text x="1350" y="459" text-anchor="middle" class="tiny">3 类行为概率</text>

  <!-- Arrows from input -->
  <path d="M290,415 C320,360 330,250 360,215" class="line"/>
  <path d="M290,485 C320,545 330,600 345,615" class="line"/>

  <!-- Global arrows -->
  <path d="M550,205 L615,205" class="line"/>
  <path d="M825,205 L890,205" class="line"/>
  <path d="M1090,205 L1160,205" class="line"/>
  <path d="M1265,265 C1265,330 900,330 835,360" class="line"/>

  <!-- TDEM arrows -->
  <path d="M560,615 L620,615" class="line"/>
  <path d="M830,615 L890,615" class="line"/>
  <path d="M1090,615 C1125,615 1125,558 1160,558" class="line"/>
  <path d="M1265,605 L1265,650" class="line"/>
  <path d="M1160,698 C1100,700 1040,735 1015,750" class="line"/>
  <path d="M1000,750 C950,655 860,530 790,470" class="line"/>

  <!-- Fusion arrows -->
  <path d="M880,415 L980,415" class="line"/>
  <path d="M1190,415 L1260,415" class="line"/>

  <!-- Mask dashed guide -->
  <path d="M452,550 C455,430 520,300 620,225" class="dash"/>
  <text x="500" y="365" class="tiny" fill="#dc2626">Mask 仅用于端部池化/增强，不替代原视频特征</text>

  <!-- Notes -->
  <rect x="55" y="765" width="650" height="105" class="box" fill="#f8fafc"/>
  <text x="80" y="800" class="label">模块含义</text>
  <text x="80" y="832" class="small">1. 全局分支保留完整个体视频信息，得到整体行为表征 Fglobal。</text>
  <text x="80" y="860" class="small">2. TDEM 分支在双端区域内计算时序差异，突出产子过程中的端部缓慢变化。</text>

  <rect x="775" y="765" width="665" height="105" class="box" fill="#f8fafc"/>
  <text x="800" y="800" class="label">融合方式</text>
  <text x="800" y="832" class="small">TDEM 不直接替代 SlowFast 特征，而是作为增强项加入全局特征。</text>
  <text x="800" y="860" class="small">系数 α 控制时序差异增强强度，融合后再输入最终分类头。</text>
</svg>
